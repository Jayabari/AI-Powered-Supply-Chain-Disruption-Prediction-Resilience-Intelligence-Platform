{% extends "base.html" %}

{% block content %}
<section class="panel grid-2">
  <div style="min-height: 320px;">
    <h2>Monthly Event Trends</h2>
    <div class="chart-container" style="height: 280px; position: relative;">
      <canvas id="trendChart" style="display: block; width: 100% !important; height: 100% !important;"></canvas>
    </div>
  </div>
  <div style="min-height: 320px;">
    <h2>Country Disruption Rate</h2>
    <div class="chart-container" style="height: 280px; position: relative;">
      <canvas id="countryChart" style="display: block; width: 100% !important; height: 100% !important;"></canvas>
    </div>
  </div>
</section>

<section class="panel">
  <h2>Financial Impact by Cause</h2>
  <div class="chart-container" style="height: 350px; position: relative;">
    <canvas id="causeChart" style="display: block; width: 100% !important; height: 100% !important;"></canvas>
  </div>
</section>

<script>
setTimeout(function() {
  const monthlyLabels = {{ monthly_labels | tojson }};
  const monthlyTotal = {{ monthly_total | tojson }};
  const monthlyDisruptions = {{ monthly_disruptions | tojson }};
  const countryLabels = {{ country_labels | tojson }};
  const countryValues = {{ country_values | tojson }};
  const causeLabels = {{ cause_labels | tojson }};
  const causeValues = {{ cause_values | tojson }};

  if (document.getElementById('trendChart') && monthlyLabels.length > 0) {
    const trendCtx = document.getElementById('trendChart').getContext('2d');
    new Chart(trendCtx, {
      type: 'line',
      data: {
        labels: monthlyLabels,
        datasets: [
          {
            label: 'Total Events',
            data: monthlyTotal,
            borderColor: '#2f6d8f',
            backgroundColor: 'rgba(47,109,143,0.15)',
            tension: 0.2,
            fill: true
          },
          {
            label: 'Disruptions',
            data: monthlyDisruptions,
            borderColor: '#d64933',
            backgroundColor: 'rgba(214,73,51,0.15)',
            tension: 0.2,
            fill: true
          }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  if (document.getElementById('countryChart') && countryLabels.length > 0) {
    const countryCtx = document.getElementById('countryChart').getContext('2d');
    new Chart(countryCtx, {
      type: 'bar',
      data: {
        labels: countryLabels,
        datasets: [{
          label: 'Disruption Rate (%)',
          data: countryValues,
          backgroundColor: '#d64933'
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  if (document.getElementById('causeChart') && causeLabels.length > 0) {
    const causeCtx = document.getElementById('causeChart').getContext('2d');
    new Chart(causeCtx, {
      type: 'bar',
      data: {
        labels: causeLabels,
        datasets: [{
          label: 'Financial Impact (USD)',
          data: causeValues,
          backgroundColor: '#edae49'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { x: { ticks: { maxRotation: 45, minRotation: 45 } } }
      }
    });
  }
}, 100);
</script>
{% endblock %}
